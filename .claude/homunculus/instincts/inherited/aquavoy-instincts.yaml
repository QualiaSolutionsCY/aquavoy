# Aquavoy Workflow Phase Planning And Verification

## Action

Follow the phase-planning-and-verification workflow:
1. Create or update .planning/phase-X-context.md with phase context.
2. Write or update .planning/phase-X-plan.md for planning.
3. Define .planning/phase-X-contract.json for contract/spec.
4. Add .planning/phase-X-verification.md for verification notes.
5. Record machine evaluation outputs in .planning/evals/harness-eval-*.json and .md.
6. Update .planning/evidence/phase-X-contract-run.json with contract run results.
7. Update .planning/qualia/state.jsonl with current state.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .planning/phase-*-context.md, .planning/phase-*-plan.md, .planning/phase-*-contract.json

